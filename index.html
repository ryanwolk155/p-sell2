<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Continuar no WhatsApp</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#0f0f0f;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
padding:20px;
}

.container{
width:100%;
max-width:420px;
background:#1a1a1a;
padding:30px;
border-radius:18px;
text-align:center;
box-shadow:0 0 25px rgba(0,0,0,.35);
}

h1{
font-size:28px;
margin-bottom:15px;
}

p{
font-size:16px;
color:#cfcfcf;
margin-bottom:30px;
line-height:1.5;
}

.btn{
display:block;
width:100%;
background:#25D366;
color:white;
text-decoration:none;
padding:18px;
font-size:22px;
font-weight:bold;
border-radius:14px;
transition:.2s;
}

.btn:active{
transform:scale(.97);
}

.small{
margin-top:18px;
font-size:13px;
color:#8d8d8d;
}
</style>
</head>
<body>

<div class="container">
<h1>Seu atendimento está pronto</h1>

<p>Clique no botão abaixo para continuar diretamente no WhatsApp.</p>

<a href="#" class="btn" onclick="abrirWhats()">ABRIR WHATSAPP</a>

<div class="small">
Caso não abra automaticamente, clique novamente.
</div>
</div>

<script>
function abrirWhats(){

var numero = "15559110590"; // TROQUE AQUI
var mensagem = "Oi vim do TikTok e quero comprar seus conteúdos!";

var texto = encodeURIComponent(mensagem);

var ua = navigator.userAgent.toLowerCase();

if(/iphone|ipad|ipod/.test(ua)){
window.location.href = "whatsapp://send?phone="+numero+"&text="+texto;

setTimeout(function(){
window.location.href = "https://api.whatsapp.com/send?phone="+numero+"&text="+texto;
},1500);

}else{

window.location.href = "intent://send?phone="+numero+"&text="+texto+"#Intent;scheme=whatsapp;package=com.whatsapp;end";

setTimeout(function(){
window.location.href = "https://api.whatsapp.com/send?phone="+numero+"&text="+texto;
},1000);

}

}
</script>

</body>
</html>
